# futebol-api

version: "3.6"

services:
  # Nginx Web Application
  webserver:
    container_name: futebol-api-webserver
    image: nginx:alpine
    working_dir: /var/www/futebol-api
    volumes:
      - .:/var/www/futebol-api
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8090:80"
    environment:
      - NGINX_HOST=localhost
    depends_on:
      - php-fpm

  # PHP-FPM
  php-fpm:
    container_name: futebol-api-php-fpm
    build: docker/php-fpm
    working_dir: /var/www/futebol-api
    volumes:
      - .:/var/www/futebol-api
      - ./docker/php-fpm/php-ini-overrides.ini:/etc/php/8.2/fpm/conf.d/99-overrides.ini
    depends_on:
      mysql:
        condition: service_started
      cognito:
        condition: service_healthy

  # MySQL
  mysql:
    container_name: futebol-api-mysql8
    image: mysql:8.0
    command: mysqld --default-authentication-plugin=caching_sha2_password --character-set-server=latin1 --collation-server=latin1_swedish_ci
    environment:
      - MYSQL_ROOT_PASSWORD=futebol-api
      - MYSQL_DATABASE=futebol-api
      - MYSQL_USER=futebol-api
      - MYSQL_PASSWORD=futebol-api
    ports:
      - "3309:3306"
    volumes:
      - './docker/db/data:/var/lib/mysql'
      - './docker/db/my.cnf:/etc/mysql/conf.d/my.cnf'
      - './docker/db/sql:/docker-entrypoint-initdb.d'

  # MailHog
  mailhog:
    container_name: futebol-api-mailhog
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"

  # Cognito Local — emula o AWS Cognito localmente (gratuito, open-source)
  # Endpoints:
  #   Dentro da rede Docker: http://cognito:9229
  #   No host:               http://localhost:9230
  #
  # Após subir, execute UMA VEZ para criar o User Pool e App Client:
  #   docker compose exec php-fpm php artisan cognito:setup
  cognito:
    container_name: futebol-api-cognito
    image: jagregory/cognito-local:latest
    ports:
      - "9230:9229"
    volumes:
      - futebol-api-cognito-data:/app/.cognito
    healthcheck:
      # Qualquer resposta HTTP (mesmo 4xx) indica que o servidor está pronto
      test:
        - "CMD-SHELL"
        - >
          node -e "
            var h = require('http');
            h.get('http://localhost:9229/', function(r) {
              process.exit(0);
            }).on('error', function(e) {
              process.exit(e.code === 'ECONNREFUSED' ? 1 : 0);
            });
          "
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 5s

volumes:
  futebol-api-cognito-data:
    driver: local
